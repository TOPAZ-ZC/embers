<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="warmth" cx="35%" cy="60%" r="65%">
      <stop offset="0%" stop-color="#ffe8c9"/>
      <stop offset="100%" stop-color="#fef3e4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emberglow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- backdrop -->
  <rect width="1200" height="630" fill="#fef3e4"/>
  <rect width="1200" height="630" fill="url(#warmth)"/>

  <!-- ember glow behind logo -->
  <circle cx="320" cy="335" r="240" fill="url(#emberglow)"/>

  <!-- floating sparks -->
  <g opacity="0.6">
    <circle cx="160" cy="180" r="6" fill="#ff6b35"/>
    <circle cx="240" cy="120" r="4" fill="#ffb627"/>
    <circle cx="420" cy="140" r="5" fill="#e63946"/>
    <circle cx="500" cy="220" r="3" fill="#ff6b35"/>
    <circle cx="120" cy="500" r="4" fill="#ffb627"/>
    <circle cx="380" cy="540" r="3" fill="#ff6b35"/>
  </g>

  <!-- Campfire mark (locked iter 14, scaled 8x to fit ~448px) -->
  <svg x="100" y="115" width="448" height="448" viewBox="0 0 56 56">
    <ellipse cx="28" cy="46.5" rx="11" ry="1.3" fill="#2b1810" opacity="0.13"/>
    <g transform="translate(28, 40) scale(0.92)">
      <g transform="rotate(25)">
        <rect x="-12" y="-2.5" width="24" height="5" rx="2.5" fill="#a67256" stroke="#2b1810" stroke-width="1.3" stroke-linejoin="round"/>
        <circle cx="-12" cy="0" r="2.5" fill="#a67256" stroke="#2b1810" stroke-width="1.3"/>
        <circle cx="12" cy="0" r="2.5" fill="#a67256" stroke="#2b1810" stroke-width="1.3"/>
      </g>
      <g transform="rotate(-25)">
        <rect x="-12" y="-2.5" width="24" height="5" rx="2.5" fill="#a67256" stroke="#2b1810" stroke-width="1.3" stroke-linejoin="round"/>
        <circle cx="-12" cy="0" r="2.5" fill="#a67256" stroke="#2b1810" stroke-width="1.3"/>
        <circle cx="12" cy="0" r="2.5" fill="#a67256" stroke="#2b1810" stroke-width="1.3"/>
      </g>
    </g>
    <svg x="12" y="6" width="32" height="32" viewBox="0 0 32 32">
      <path d="M12 4 C 11 6, 10 9, 9 12 C 8 14, 7.5 17, 7.5 19 C 7 24, 11 28.5, 16 28.5 C 21 28.5, 25 24, 25 19 C 25 16, 24 13, 22.5 10 C 21.5 7.5, 20 5.5, 19.5 4.5 C 19 6, 18.5 7, 18 7.5 C 17.5 8, 17 7.8, 16.5 7.5 C 16 7.2, 15.5 6.5, 15 5 C 14.5 3.5, 14 2.5, 13.5 2.5 C 13 2.5, 12.5 3, 12 4 Z" fill="#e63946" stroke="#2b1810" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M14.5 9 C 12.5 11, 11 14, 11 17.5 C 11 22.5, 13 25.5, 16 25.5 C 19 25.5, 21.5 23.5, 21.5 20 C 21.5 16.5, 20 14, 18.5 12.5 C 18 13.5, 17 13.5, 16 13 C 15.5 11.5, 15 10, 14.5 9 Z" fill="#ff6b35"/>
      <path d="M15 17 C 13.5 18.5, 13 20.5, 13.5 22.5 C 14 24, 15 24.5, 16 24.5 C 17.5 24.5, 18.5 24, 18.5 22.5 C 19 20.5, 18 19, 16.5 18 C 16 17.5, 15.5 17.5, 15 17 Z" fill="#ffb627"/>
    </svg>
  </svg>

  <!-- Wordmark + tagline -->
  <text x="600" y="264" font-family="Fraunces, Georgia, serif" font-style="italic" font-weight="800" font-size="148" fill="#2b1810" letter-spacing="-3">Embers</text>
  <text x="600" y="344" font-family="Fraunces, Georgia, serif" font-weight="500" font-size="46" fill="#2b1810" letter-spacing="-1">keep every thread <tspan font-style="italic" fill="#e63946">warm</tspan>.</text>

  <!-- Value line -->
  <text x="600" y="426" font-family="Outfit, sans-serif" font-weight="600" font-size="32" fill="#5b4030">A different voice for every person.</text>

  <!-- domain footer -->
  <text x="600" y="474" font-family="Outfit, sans-serif" font-weight="600" font-size="24" fill="#6b4a35">tryembers.com</text>
</svg>
